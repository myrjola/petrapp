name: Pull Request Build
permissions:
  contents: read
on:
  - pull_request
  - workflow_call

# The work is split across two parallel jobs so the deploy gate's wall-clock is
# max(tests, checks) rather than their sum. The shuffled --race suite is the long
# pole, so it gets its own runner; everything else (build, lint, govulncheck,
# migration test) runs alongside it. Both must pass for the workflow — and thus
# the prod deploy gate in main.yml — to succeed.
#
# setup-go's built-in cache is disabled (cache: false) because both jobs would
# key it on go.sum and clobber each other's GOCACHE — the tests job holds
# -race-instrumented objects, the checks job plain ones. Instead each job keeps
# its own go-build cache (gobuild-tests-* / gobuild-checks-*) and they share the
# module cache (identical for both).
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: gomod-${{ hashFiles('go.sum') }}
          restore-keys: gomod-

      - name: Cache Go build (race)
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: gobuild-tests-${{ hashFiles('go.sum') }}
          restore-keys: gobuild-tests-

      - name: Cache Playwright browsers and driver
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/ms-playwright-go
          key: playwright-${{ hashFiles('go.sum') }}

      - name: Test (shuffled, race)
        run: make test-shuffle

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: gomod-${{ hashFiles('go.sum') }}
          restore-keys: gomod-

      - name: Cache Go build
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: gobuild-checks-${{ hashFiles('go.sum') }}
          restore-keys: gobuild-checks-

      - name: Cache golangci-lint binary
        uses: actions/cache@v5
        with:
          path: bin/golangci-lint
          key: golangci-lint-bin-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Cache golangci-lint analysis results
        uses: actions/cache@v5
        with:
          path: .cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('Makefile', '.golangci.yml', 'go.sum') }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-

      - name: Build, lint, vuln-check
        run: make ci-checks

      - name: Install Litestream
        run: |
          wget https://github.com/benbjohnson/litestream/releases/download/v0.5.10/litestream-0.5.10-linux-x86_64.deb
          sudo dpkg -i litestream-0.5.10-linux-x86_64.deb

      - name: Run migrations against production database
        env:
          LITESTREAM_REPLICA_TYPE: s3
          PETRAPP_SQLITE_URL: restored.sqlite3
          AWS_ACCESS_KEY_ID: ${{ secrets.MIGRATIONTEST_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MIGRATIONTEST_AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: https://fly.storage.tigris.dev
          AWS_ENDPOINT_URL_IAM: https://fly.iam.storage.tigris.dev
          AWS_REGION: auto
          BUCKET_NAME: petra-backup
        run: make migratetest
