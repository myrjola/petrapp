name: Deploy and Smoke Test
permissions:
  contents: read
on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
      fly_app:
        required: true
        type: string
      docker_image_uri:
        required: true
        type: string

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_REGION: arn
  FLY_ORG: personal
  APP_HOSTNAME: ${{ inputs.fly_app }}.fly.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ inputs.fly_app }}
    environment:
      name: ${{ inputs.env }}
      url: https://${{ env.APP_HOSTNAME }}
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Authenticate Docker with Fly image registry
        run: flyctl auth docker
      - name: Wait for image to be visible because there seems to be some eventual consistency at play.
        run: |
          for i in 1 2 3 4 5 6 7 8 9; do
            docker manifest inspect ${{ inputs.docker_image_uri }} && break
            [ $i -lt 3 ] && sleep 5
          done
      - run: flyctl deploy --app ${{ inputs.fly_app }} --remote-only --image ${{ inputs.docker_image_uri }}

  # Can't pass env vars to reusable workflows directly.
  # See https://github.com/actions/runner/issues/2372#issuecomment-1591370444
  get_env_vars:
    name: Get environment vars
    runs-on: ubuntu-latest
    outputs:
      app_hostname: ${{ env.APP_HOSTNAME }}
    steps:
      - run: echo "no-op"

  smoke_test:
    uses: ./.github/workflows/smoke-test.yml
    needs: [ deploy, get_env_vars ]
    with:
      hostname: ${{ needs.get_env_vars.outputs.app_hostname }}
