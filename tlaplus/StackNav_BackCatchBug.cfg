\* TLC config: model the ACTUAL production navbug.
\*
\* Bug: main.js's in-page back-button click handler registers
\*   navigation.traverseTo(key).committed.catch(() =>
\*     location.assign(link.href))
\* The .committed promise is left pending when the issuing doc goes
\* into bfcache. When the issuing doc is later restored (via
\* Forward), and any new navigation is initiated from it (e.g. the
\* pagereveal staleness reload added in main.js commit 065c887),
\* the supersede causes .committed to reject. The .catch then runs
\* location.assign with the closure-captured back-link URL, pushing
\* a spurious history entry at that URL.
\*
\* Confirmed by the production [navbug] diagnostic log. Fix
\* committed in main.js as 6a4c239 (drop the .catch fallback).
\* Setting EnableBackCatchBug = FALSE in this same cfg models the
\* fix and TLC then finds no violation -- see below.
\*
\* EnableBackCatchBug = TRUE: TLC produces a counterexample whose
\* shape matches the production trace:
\*   1. ClickLink(u2)      -- workout -> exercise
\*   2. GetResponse        -- exercise loaded with bakedToken = NIL
\*   3. BackButtonClick    -- in-page back to workout, pendingCatch
\*                            registered with srcIdx=2, captureUrl=u1
\*   4. SubmitForm(u1, ..) -- POST on workout (or anywhere that
\*                            rotates serverToken)
\*   5. PageshowReload     -- workout's bfcache stale, reload
\*   6. GetResponse        -- workout re-baked with new token
\*   7. GoForward          -- forward to exercise; bfcache restore
\*                            with stale meta. lastForwardTargetIdx=2.
\*   8. BackCatchFiresOnReveal -- pagereveal-driven reload aborts
\*                            the pending committed, .catch pushes
\*                            new entry at captureUrl (u1=workout).
\*                            idx=3, lastForwardTargetIdx=2 ->
\*                            VIOLATION of ForwardLandsAtTarget.

SPECIFICATION Spec

CONSTANTS
    Urls = {u1, u2, u3}
    PageLocalUrls = {u3}
    InitialUrl = u1
    MaxHistory = 3
    MaxPosts = 2
    CookieMayExpire = FALSE
    PrefetchEnabled = FALSE
    EagerPagerevealCheck = TRUE
    EnableForwardMisroute = FALSE
    EnableBackCatchBug = TRUE

INVARIANTS
    TypeOk
    HistoryAligned
    ForwardLandsAtTarget

CONSTRAINT
    StateConstraint
