\* TLC config for StackNav with cookie expiration ENABLED.
\* Expectation: NoStaleSettled is VIOLATED. The expected counterexample
\* trace looks like:
\*   1. Init: serverToken = NIL, cookieToken = NIL, page rendered with
\*      bakedToken = NIL.
\*   2. ClickLink -> u2: history is [u1@NIL, u2@_], idx=2, u1 bfcached
\*      with bakedToken = NIL.
\*   3. GetResponse: u2 baked with NIL (serverToken still NIL).
\*   4. SubmitForm(u2, replace=FALSE): server rotates token; X-Location
\*      points to a backward URL or current URL. Pick replace so u2 is
\*      re-baked with the new token. Now serverToken = cookieToken = 1.
\*   5. CookieExpire: cookieToken = NIL.
\*   6. GoBack: traverse to u1, bfcache hit, docState = "Bfcached" with
\*      bakedToken = NIL.
\*   7. PageshowFresh fires: CurrentBaked (NIL) = cookieToken (NIL),
\*      so the handler thinks the page is fresh and does nothing.
\*      docState -> "Loaded". But serverToken = 1, NoStaleSettled
\*      violated.

SPECIFICATION Spec

CONSTANTS
    Urls = {u1, u2, u3}
    PageLocalUrls = {u3}
    InitialUrl = u1
    MaxHistory = 3
    MaxPosts = 2
    CookieMayExpire = TRUE
    PrefetchEnabled = FALSE
    EagerPagerevealCheck = FALSE
    EnableForwardMisroute = FALSE
    EnableBackCatchBug = FALSE

INVARIANTS
    TypeOk
    HistoryAligned
    NoStaleSettled

CONSTRAINT
    StateConstraint
