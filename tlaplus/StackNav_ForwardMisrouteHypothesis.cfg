\* TLC config exercising the FORWARD-MISROUTE HYPOTHESIS (DISPROVEN).
\*
\* Retained for didactic comparison with StackNav_BackCatchBug.cfg.
\* The hypothesis was: the new pagereveal handler in main.js:633
\* calls navigation.reload() synchronously inside a pagereveal event
\* during a forward-traverse commit, and Chromium misroutes that
\* reload into a push of a new entry at history[idx-1].url instead
\* of reloading at idx. EnableForwardMisroute = TRUE turns on the
\* PagerevealMisrouteOnForward action that models that misrouting.
\*
\* Disproven by the production [navbug] diagnostic log: the
\* navigation.reload event's destination URL is the correct
\* exercise URL, not the workout URL. The real bug is modeled by
\* StackNav_BackCatchBug.cfg (EnableBackCatchBug = TRUE) -- it's
\* the back-button click handler's .committed.catch fallback firing
\* late from a stale closure.
\*
\* TLC behavior under this cfg: PagerevealMisrouteOnForward fires
\* and ForwardLandsAtTarget violation surfaces. The trace is
\* SHAPE-similar to the production bug but mechanism-wrong. Useful
\* for confirming TLC mechanics and as a record of the explored
\* hypothesis space.

SPECIFICATION Spec

CONSTANTS
    Urls = {u1, u2, u3}
    PageLocalUrls = {u3}
    InitialUrl = u1
    MaxHistory = 3
    MaxPosts = 2
    CookieMayExpire = FALSE
    PrefetchEnabled = FALSE
    EagerPagerevealCheck = TRUE
    EnableForwardMisroute = TRUE
    EnableBackCatchBug = FALSE

INVARIANTS
    TypeOk
    HistoryAligned
    ForwardLandsAtTarget

CONSTRAINT
    StateConstraint
