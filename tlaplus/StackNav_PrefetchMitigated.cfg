\* TLC config: prefetch enabled, mitigation (EagerPagerevealCheck) ON.
\* Cookie expiration disabled. With pagereveal-time staleness checking
\* every promoted prefetch goes through the same compare-and-reload that
\* bfcache restore does today. Expectation: NoStaleSettled HOLDS.

SPECIFICATION Spec

CONSTANTS
    Urls = {u1, u2, u3}
    PageLocalUrls = {u3}
    InitialUrl = u1
    MaxHistory = 3
    MaxPosts = 2
    CookieMayExpire = FALSE
    PrefetchEnabled = TRUE
    EagerPagerevealCheck = TRUE

INVARIANTS
    TypeOk
    HistoryAligned
    NoStaleSettled

PROPERTIES
    TransientResolves

CONSTRAINT
    StateConstraint
