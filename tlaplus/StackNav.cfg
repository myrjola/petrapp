\* TLC config for StackNav with cookie expiration DISABLED.
\* Expected: NoStaleSettled holds. This is the "happy path" model where
\* the inv_bfcache cookie never disappears, so the bfcache reload check
\* always observes the right cookie value and can detect every stale
\* restore.

SPECIFICATION Spec

CONSTANTS
    Urls = {u1, u2, u3}
    PageLocalUrls = {u3}
    InitialUrl = u1
    MaxHistory = 3
    MaxPosts = 2
    CookieMayExpire = FALSE
    PrefetchEnabled = FALSE
    EagerPagerevealCheck = FALSE

INVARIANTS
    TypeOk
    HistoryAligned
    NoStaleSettled

PROPERTIES
    TransientResolves

CONSTRAINT
    StateConstraint
